name: Backend Cron Jobs

on:
  schedule:
    # 매 5분마다 실행 (GitHub Actions의 최소/권장 주기)
    - cron: '*/5 * * * *'
  workflow_dispatch: # 수동으로도 트리거할 수 있도록 허용

jobs:
  run-cron-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      INTERNAL_JOB_SECRET: ${{ secrets.INTERNAL_JOB_SECRET }}
    steps:
      - name: Validate cron secrets
        run: |
          test -n "$API_BASE_URL"
          test -n "$INTERNAL_JOB_SECRET"

      - name: Health check
        run: |
          curl --fail-with-body --silent --show-error \
               --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 30 \
               "${API_BASE_URL}/health"

      - name: Process Queue (MQ Consumer)
        run: |
          curl --fail-with-body --silent --show-error \
               --connect-timeout 10 --max-time 75 \
               -X POST "${API_BASE_URL}/queue/process-once" \
               -H "x-internal-job-secret: ${INTERNAL_JOB_SECRET}" \
               -H "Content-Type: application/json" \
               --data '{"visibilityTimeoutSeconds":60,"quantity":3}'

      - name: Expire Pending Toss Payments
        run: |
          curl --fail-with-body --silent --show-error \
               --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 30 \
               -X POST "${API_BASE_URL}/payments/toss/expire-pending" \
               -H "x-internal-job-secret: ${INTERNAL_JOB_SECRET}" \
               -H "Content-Type: application/json"

      - name: Reconcile Toss Payments
        run: |
          curl --fail-with-body --silent --show-error \
               --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 30 \
               -X POST "${API_BASE_URL}/payments/toss/reconcile" \
               -H "x-internal-job-secret: ${INTERNAL_JOB_SECRET}" \
               -H "Content-Type: application/json"
