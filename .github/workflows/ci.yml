name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────
  # 1. 백엔드 타입 체크 + 단위 테스트
  # ─────────────────────────────────────────
  backend:
    name: Backend (tsc + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:test@localhost:5432/postgres"
          DIRECT_URL: "postgresql://postgres:test@localhost:5432/postgres"

      - name: Type check
        run: pnpm --filter backend exec tsc --noEmit

      - name: Unit tests
        run: pnpm --filter backend exec vitest run
        env:
          DATABASE_URL: "postgresql://postgres:test@localhost:5432/postgres"
          DIRECT_URL: "postgresql://postgres:test@localhost:5432/postgres"
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_KEY: "placeholder"
          NODE_ENV: test

  # ─────────────────────────────────────────
  # 2. 프론트엔드 타입 체크 (세 앱 병렬)
  # ─────────────────────────────────────────
  frontend-typecheck:
    name: Frontend type check (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [admin, delivery-customer, brand-website]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # shared 패키지 빌드 (프론트 타입 체크 의존성)
      - name: Build shared packages
        run: pnpm --filter @order/shared build || true

      - name: Type check ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} exec tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder.placeholder"
          NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"

  # ─────────────────────────────────────────
  # 3. Playwright E2E (admin + delivery-customer)
  # ─────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # CI에서는 next dev 콜드스타트가 webServer 타임아웃을 유발하므로
      # 미리 production build 후 next start 로 띄운다.
      - name: Build admin & delivery-customer
        run: |
          pnpm --filter admin build
          pnpm --filter delivery-customer build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder.placeholder' }}
          NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"
          NEXT_PUBLIC_FIREBASE_API_KEY: ""
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ""
          NEXT_PUBLIC_FIREBASE_APP_ID: ""
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: ""

      - name: Run E2E tests
        run: pnpm test:e2e --project=admin --project=delivery
        env:
          CI: true
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder.placeholder' }}
          NEXT_PUBLIC_API_URL: "http://localhost:4000/api/v1"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
